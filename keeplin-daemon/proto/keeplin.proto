syntax = "proto3";

package keeplin;

// ── Common message types ──────────────────────────────────────────────────────

message Note {
  string id              = 1;
  string title           = 2;
  string body            = 3;
  // absent means the note is not filed in any notebook
  optional string notebook_id    = 4;
  bool   is_todo         = 5;
  // absent means no due date is set
  optional string todo_due       = 6;  // RFC-3339
  // absent means the to-do has not been completed
  optional string todo_completed = 7;  // RFC-3339
  string created_at      = 8;  // RFC-3339
  string updated_at      = 9;  // RFC-3339
  // absent means the note has not been deleted
  optional string deleted_at     = 10; // RFC-3339
  // absent means the note has no alias
  optional string alias  = 11;
  // bookmarks (in-note anchors) derived from `[text](### "alias")` links in the body
  repeated Bookmark bookmarks = 12;
  // links to other notes (content-derived and manually added)
  repeated NoteLink links     = 13;
}

message Notebook {
  string id         = 1;
  string title      = 2;
  string created_at = 3;  // RFC-3339
  string updated_at = 4;  // RFC-3339
  // absent means the notebook has not been deleted
  optional string deleted_at = 5;  // RFC-3339
  // absent means the notebook has no alias
  optional string alias = 6;
}

// An in-note anchor declared as `[text](### "alias")`. `number` is the 1-based position among
// the note's bookmarks; `text` is the link text; `alias` is the link title (defaults to `text`).
message Bookmark {
  uint32 number = 1;
  string text   = 2;
  string alias  = 3;
}

// A link from a note to another note. `source` is "content" or "manual"; `raw` is the
// literal `#…` reference; `target_note_id` is the best-effort resolved note UUID.
message NoteLink {
  string source = 1;
  string raw    = 2;
  optional string target_note_id = 3;
}

message Tag {
  string id         = 1;
  string title      = 2;
  string created_at = 3;  // RFC-3339
  string updated_at = 4;  // RFC-3339
  // absent means the tag has not been deleted
  optional string deleted_at = 5;  // RFC-3339
}

message Resource {
  string id         = 1;
  string title      = 2;
  string mime_type  = 3;
  string file_name  = 4;
  int64  size       = 5;
  string created_at = 6;  // RFC-3339
}

// ── Note requests / responses ─────────────────────────────────────────────────

// page_size = 0 uses the server default (100). page_token = "" means start from
// the beginning. Both fields are omitted for a simple full-scan request.
message ListNotesRequest {
  uint32 page_size  = 1;
  string page_token = 2;
}

message ListNotesResponse {
  repeated Note notes          = 1;
  // empty string means there are no further pages
  string        next_page_token = 2;
}

message CreateNoteRequest {
  string title       = 1;
  string body        = 2;
  string notebook_id = 3;
  bool   is_todo     = 4;
  string todo_due    = 5;
}

message CreateNoteResponse {
  Note note = 1;
}

message GetNoteRequest {
  string id = 1;
}

message GetNoteResponse {
  Note note = 1;
}

message UpdateNoteRequest {
  Note note = 1;
}

message UpdateNoteResponse {
  Note note = 1;
}

message DeleteNoteRequest {
  string id = 1;
}

message DeleteNoteResponse {}

// ── Notebook requests / responses ─────────────────────────────────────────────

message ListNotebooksRequest {
  uint32 page_size  = 1;
  string page_token = 2;
}

message ListNotebooksResponse {
  repeated Notebook notebooks    = 1;
  string            next_page_token = 2;
}

message CreateNotebookRequest {
  string title = 1;
}

message CreateNotebookResponse {
  Notebook notebook = 1;
}

message GetNotebookRequest {
  string id = 1;
}

message GetNotebookResponse {
  Notebook notebook = 1;
}

message UpdateNotebookRequest {
  Notebook notebook = 1;
}

message UpdateNotebookResponse {
  Notebook notebook = 1;
}

message DeleteNotebookRequest {
  string id = 1;
}

message DeleteNotebookResponse {}

// ── Tag requests / responses ──────────────────────────────────────────────────

message ListTagsRequest {
  uint32 page_size  = 1;
  string page_token = 2;
}

message ListTagsResponse {
  repeated Tag tags          = 1;
  string       next_page_token = 2;
}

message CreateTagRequest {
  string title = 1;
}

message CreateTagResponse {
  Tag tag = 1;
}

message GetTagRequest {
  string id = 1;
}

message GetTagResponse {
  Tag tag = 1;
}

message UpdateTagRequest {
  Tag tag = 1;
}

message UpdateTagResponse {
  Tag tag = 1;
}

message DeleteTagRequest {
  string id = 1;
}

message DeleteTagResponse {}

message AddNoteTagRequest {
  string note_id = 1;
  string tag_id  = 2;
}

message AddNoteTagResponse {}

message RemoveNoteTagRequest {
  string note_id = 1;
  string tag_id  = 2;
}

message RemoveNoteTagResponse {}

message ListNoteTagsRequest {
  string note_id    = 1;
  uint32 page_size  = 2;
  string page_token = 3;
}

message ListNoteTagsResponse {
  repeated Tag tags          = 1;
  string       next_page_token = 2;
}

// ── Resource requests / responses ─────────────────────────────────────────────

message ListResourcesRequest {
  uint32 page_size  = 1;
  string page_token = 2;
}

message ListResourcesResponse {
  repeated Resource resources      = 1;
  string            next_page_token = 2;
}

message GetResourceRequest {
  string id = 1;
}

message GetResourceResponse {
  Resource resource = 1;
  bytes    data     = 2;
}

message CreateResourceRequest {
  string title     = 1;
  string mime_type = 2;
  string file_name = 3;
  bytes  data      = 4;
}

message CreateResourceResponse {
  Resource resource = 1;
}

message DeleteResourceRequest {
  string id = 1;
}

message DeleteResourceResponse {}

// ── Sync ──────────────────────────────────────────────────────────────────────

message SyncRequest {}

message SyncProgress {
  enum Stage {
    COLLECTING  = 0;
    SENDING     = 1;
    RECEIVING   = 2;
    APPLYING    = 3;
    DONE        = 4;
  }
  Stage  stage          = 1;
  int32  changes_count  = 2;
  string message        = 3;
}

// ── Bookmarks & links ─────────────────────────────────────────────────────────

message SetNoteAliasRequest {
  string id = 1;
  // absent clears the alias
  optional string alias = 2;
}
message SetNoteAliasResponse { Note note = 1; }

message SetNotebookAliasRequest {
  string id = 1;
  // absent clears the alias
  optional string alias = 2;
}
message SetNotebookAliasResponse { Notebook notebook = 1; }

message AddNoteLinkRequest {
  string note_id = 1;
  string raw     = 2;  // a `#…` reference
}
message AddNoteLinkResponse { Note note = 1; }

message RemoveNoteLinkRequest {
  string note_id = 1;
  uint32 index   = 2;  // 0-based index into the note's links
}
message RemoveNoteLinkResponse { Note note = 1; }

message ListBacklinksRequest {
  string note_id    = 1;
  uint32 page_size  = 2;  // 0 → server default (100)
  string page_token = 3;  // "" → first page
}
message ListBacklinksResponse {
  repeated Note notes   = 1;
  string next_page_token = 2;  // "" when there are no more pages
}

message ResolveReferenceRequest { string reference = 1; }  // a `#…` reference
message ResolveReferenceResponse {
  // absent when the reference does not resolve to any note
  optional string note_id        = 1;
  // absent when the reference had no (resolvable) bookmark segment
  optional uint32 bookmark_number = 2;
}

message NoteAliasConflict {
  string alias       = 1;
  repeated Note notes = 2;  // the colliding notes, ordered by uuid
}
message NotebookAliasConflict {
  string alias                = 1;
  repeated Notebook notebooks = 2;  // the colliding notebooks, ordered by uuid
}
message ListAliasConflictsRequest {}
message ListAliasConflictsResponse {
  repeated NoteAliasConflict notes         = 1;
  repeated NotebookAliasConflict notebooks = 2;
}

// ── Service definition ────────────────────────────────────────────────────────

service KeeplinService {
  // Notes
  rpc ListNotes    (ListNotesRequest)    returns (ListNotesResponse);
  rpc CreateNote   (CreateNoteRequest)   returns (CreateNoteResponse);
  rpc GetNote      (GetNoteRequest)      returns (GetNoteResponse);
  rpc UpdateNote   (UpdateNoteRequest)   returns (UpdateNoteResponse);
  rpc DeleteNote   (DeleteNoteRequest)   returns (DeleteNoteResponse);

  // Notebooks
  rpc ListNotebooks   (ListNotebooksRequest)   returns (ListNotebooksResponse);
  rpc CreateNotebook  (CreateNotebookRequest)  returns (CreateNotebookResponse);
  rpc GetNotebook     (GetNotebookRequest)     returns (GetNotebookResponse);
  rpc UpdateNotebook  (UpdateNotebookRequest)  returns (UpdateNotebookResponse);
  rpc DeleteNotebook  (DeleteNotebookRequest)  returns (DeleteNotebookResponse);

  // Tags
  rpc ListTags      (ListTagsRequest)      returns (ListTagsResponse);
  rpc CreateTag     (CreateTagRequest)     returns (CreateTagResponse);
  rpc GetTag        (GetTagRequest)        returns (GetTagResponse);
  rpc UpdateTag     (UpdateTagRequest)     returns (UpdateTagResponse);
  rpc DeleteTag     (DeleteTagRequest)     returns (DeleteTagResponse);
  rpc AddNoteTag    (AddNoteTagRequest)    returns (AddNoteTagResponse);
  rpc RemoveNoteTag (RemoveNoteTagRequest) returns (RemoveNoteTagResponse);
  rpc ListNoteTags  (ListNoteTagsRequest)  returns (ListNoteTagsResponse);

  // Resources
  rpc ListResources   (ListResourcesRequest)   returns (ListResourcesResponse);
  rpc CreateResource  (CreateResourceRequest)  returns (CreateResourceResponse);
  rpc GetResource     (GetResourceRequest)     returns (GetResourceResponse);
  rpc DeleteResource  (DeleteResourceRequest)  returns (DeleteResourceResponse);

  // Bookmarks & links
  rpc SetNoteAlias      (SetNoteAliasRequest)      returns (SetNoteAliasResponse);
  rpc SetNotebookAlias  (SetNotebookAliasRequest)  returns (SetNotebookAliasResponse);
  rpc AddNoteLink       (AddNoteLinkRequest)       returns (AddNoteLinkResponse);
  rpc RemoveNoteLink    (RemoveNoteLinkRequest)    returns (RemoveNoteLinkResponse);
  rpc ListBacklinks     (ListBacklinksRequest)     returns (ListBacklinksResponse);
  rpc ResolveReference  (ResolveReferenceRequest)  returns (ResolveReferenceResponse);
  rpc ListAliasConflicts (ListAliasConflictsRequest) returns (ListAliasConflictsResponse);

  // Sync (server-streaming so progress can be reported)
  rpc Sync (SyncRequest) returns (stream SyncProgress);
}
