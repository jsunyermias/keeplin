# NOTE: build profiles do NOT belong here. Cargo reads `[profile.*]` only from a
# manifest (the workspace root `Cargo.toml`), never from `.cargo/config.toml`, so a
# profile placed here is silently ignored. The release profile now lives in
# `../Cargo.toml`. This file is reserved for genuine Cargo configuration such as the
# cross-compilation linker settings below.

# ── Cross-compilation targets ─────────────────────────────────────────────────
# Uncomment and configure linkers when targeting non-host platforms.

# [target.x86_64-unknown-linux-musl]
# linker = "x86_64-linux-musl-gcc"

# [target.aarch64-unknown-linux-musl]
# linker = "aarch64-linux-musl-gcc"

# [target.x86_64-pc-windows-gnu]
# linker = "x86_64-w64-mingw32-gcc"

# [target.aarch64-apple-darwin]
# linker = "aarch64-apple-darwin-clang"

# [target.aarch64-linux-android]
# linker = "aarch64-linux-android-clang"
