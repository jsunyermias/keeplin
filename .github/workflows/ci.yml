name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Check, Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo & build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get update -q && sudo apt-get install -y protobuf-compiler

      - name: cargo fmt (workspace)
        run: cargo fmt --check --all

      - name: cargo test (keeplin-core)
        run: cargo test -p keeplin-core

      - name: cargo test (keeplin-daemon)
        run: cargo test -p keeplin-daemon

      # --all-targets lints test and bench code too, matching the command the README
      # tells contributors to run locally. It also fully subsumes `cargo check`.
      - name: cargo clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Prebuilt binary instead of `cargo install cargo-audit` — compiling the tool
      # from source added minutes to every run for no additional coverage.
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit dependencies
        run: cargo audit
